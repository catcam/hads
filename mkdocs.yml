site_name: HADS — Human-AI Document Standard
site_description: A lightweight convention for writing technical documentation that works for both humans and AI
site_url: https://catcam.github.io/hads
repo_url: https://github.com/catcam/hads
repo_name: catcam/hads
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Specification:
    - Overview: spec/overview.md
    - Block Types: spec/block-types.md
    - Document Structure: spec/structure.md
    - Validation: spec/validation.md
  - Writing Guide: writing.md
  - Examples:
    - examples/index.md
    - REST API Reference: examples/api-reference.md
    - File Format: examples/file-format.md
    - Configuration System: examples/configuration.md
  - Ecosystem: ecosystem.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true
  - attr_list

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/catcam/hads
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: Thanks for the feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: Thanks — we'll work on it.

copyright: HADS is an open standard · MIT License
